# ============================================
# Application
# ============================================
spring.application.name=RIDE-SERVICE
server.port=${SERVER_PORT}

# ============================================
# Database (loaded from .env ? System Properties)
# ============================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================
# Eureka
# ============================================
eureka.client.service-url.defaultZone=${EUREKA_URL}
eureka.instance.hostname=localhost
eureka.client.prefer-ip-address=true

# ============================================
# JWT
# ============================================
jwt.secret=${JWT_SECRET}

# ============================================
# Actuator - Monitoring Endpoints
# ============================================
management.endpoints.web.exposure.include=health,info,metrics,env,beans,mappings
management.endpoint.health.show-details=always
management.info.env.enabled=true
info.app.name=Ride Booking Service
info.app.description=Microservice for managing ride bookings
info.app.version=1.0.0

# ============================================
# Swagger / OpenAPI
# ============================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ============================================
# Logging
# ============================================
logging.level.root=INFO
logging.level.com.cts=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/ride-service.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ============================================
# Feign
# ============================================
spring.cloud.openfeign.client.config.default.connect-timeout=5000
spring.cloud.openfeign.client.config.default.read-timeout=5000